# OPI Blueprint Registry
# ──────────────────────────────────────────────────────────────────────────────
# Each entry represents one blueprint proposal submitted to the OPI TSC.
#
# STAGES (in order):
#   proposed      → One-pager submitted, awaiting TSC scheduling
#   tsc_review    → Presented to TSC; resource & priority alignment in progress
#   build         → Engineering work underway; deliverables being produced
#   validate      → Solution built; validation/testing in progress in OPI Lab
#   published     → All deliverables complete; published to GitHub & OPI website
#
# CATEGORIES: networking | security | storage | provisioning | compute
#
# DELIVERABLES (all five required for "published"):
#   reference_architecture  – topology diagram (hw, sw, network)
#   bill_of_materials       – validated HW/SW list with versions
#   deployment_guide        – step-by-step docs + IaC artifacts
#   use_case_narrative      – business problem, target persona, why DPU/IPU
#   validation_results      – benchmarks, screenshots, or recorded walkthrough
# ──────────────────────────────────────────────────────────────────────────────

blueprints:

