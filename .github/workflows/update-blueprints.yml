name: Update Blueprint Dashboard

on:
  push:
    paths:
      - 'blueprints/blueprints.yaml'   # triggers when the registry changes
  workflow_dispatch:                    # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate BLUEPRINTS.md summary
        run: python .github/scripts/generate_blueprints_md.py

      - name: Commit and push if changed
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add BLUEPRINTS.md
          git diff --cached --quiet || git commit -m "chore: auto-update BLUEPRINTS.md [skip ci]"
          git push
